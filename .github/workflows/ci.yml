name: CI

on:
  pull_request:
  push:
    branches-ignore: [main]

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Build
        working-directory: frontend
        run: |
          npm ci
          npm run build

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install deps
        run: pip install -r backend/requirements.txt
      - name: Byte-compile
        run: python -m compileall backend/app
      - name: Import app
        env:
          PYTHONPATH: .
        run: python -c "import backend.app.main; print('import OK')"
      - name: Rate-limit HTTP test
        env:
          PYTHONPATH: .
          SANDCASTLE_RATELIMIT: 'true'
          SANDCASTLE_RATE_SESSIONS_PER_HOUR: '2'
        run: python backend/scripts/ratelimit_http_test.py
