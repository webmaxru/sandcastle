# One-command local run:  docker compose up --build
#
# Auth: the backend spawns the GitHub Copilot CLI, which needs either a token
# or an interactive login. Options:
#   A) Put COPILOT_GITHUB_TOKEN=github_pat_... in a local .env (see .env.example)
#   B) Or, after `docker compose up`, log in once inside the container:
#        docker compose exec backend copilot   (then /login and follow device flow)
#      The login persists in the named `copilot-auth` volume.
services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      PORT: '8000'
      SANDCASTLE_CORS_ORIGINS: 'http://localhost:5173'
      # Pass through auth from your shell / .env (all optional):
      COPILOT_GITHUB_TOKEN: ${COPILOT_GITHUB_TOKEN:-}
      COPILOT_PROVIDER_BASE_URL: ${COPILOT_PROVIDER_BASE_URL:-}
      COPILOT_PROVIDER_API_KEY: ${COPILOT_PROVIDER_API_KEY:-}
      APPLICATIONINSIGHTS_CONNECTION_STRING: ${APPLICATIONINSIGHTS_CONNECTION_STRING:-}
    volumes:
      - copilot-auth:/home/appuser/.copilot
    ports:
      - '8000:8000'

  web:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0 --port 5173"
    environment:
      VITE_PROXY_TARGET: 'http://backend:8000'
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - '5173:5173'
    depends_on:
      - backend

volumes:
  copilot-auth:
