      <main class="ns">
        <h1>Sandcastle — watch an AI team build a running app, live</h1>
        <p>
          Describe an app and a GitHub Copilot multi-agent team —
          <strong>Planner</strong>, <strong>Builder</strong> and <strong>Fixer</strong> —
          plans it, writes the files, runs it, and self-heals its own build errors against a
          real validator, streaming a live preview you keep iterating on by chat.
        </p>
        <p>
          Sandcastle is a live showcase for the GitHub Copilot provider for the Microsoft
          Agent Framework. It runs entirely on Azure free tiers.
        </p>
        <ul>
          <li>Real execution — agents run, build, and test the app they write.</li>
          <li>Browsable source and a live preview: the artifact is real, not vibes.</li>
          <li>Grounded in current docs via the Microsoft Learn MCP server.</li>
        </ul>
        <p>
          <strong>This app needs JavaScript to run interactively.</strong>
          Open <a href="https://sandcastle.isainative.dev/">sandcastle.isainative.dev</a> in a
          modern browser, or read the source on
          <a href="https://github.com/webmaxru/sandcastle">GitHub</a>.
        </p>
