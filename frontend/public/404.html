<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, follow" />
    <meta name="color-scheme" content="light" />
    <title>Page not found — Sandcastle</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <style>
      :root { color-scheme: light; }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        min-height: 100vh; display: flex; align-items: center; justify-content: center;
        background: #f5f7f9; color: #1f2734;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        line-height: 1.5; padding: 1.5rem;
      }
      .card {
        max-width: 30rem; text-align: center; background: #fdfdfe;
        border: 1px solid #dadee3; border-radius: 18px; padding: 2.75rem 2rem;
        box-shadow: 0 1px 2px rgba(31, 39, 52, 0.05), 0 12px 32px rgba(31, 39, 52, 0.07);
      }
      .mark { width: 64px; height: 64px; margin: 0 auto 1.25rem; display: block; border-radius: 14px; }
      .code { font-size: 0.85rem; letter-spacing: 0.12em; text-transform: uppercase; color: #636975; }
      h1 { font-size: 1.6rem; letter-spacing: -0.02em; margin: 0.35rem 0 0.6rem; }
      p { color: #4c535f; margin-bottom: 1.5rem; }
      a.btn {
        display: inline-block; background: #3461c9; color: #fdfcff; text-decoration: none;
        font-weight: 600; padding: 0.7rem 1.4rem; border-radius: 10px;
      }
      a.btn:hover { background: #254dac; }
      a.btn:focus-visible { outline: 2px solid #254dac; outline-offset: 3px; }
    </style>
  </head>
  <body>
    <main class="card">
      <svg class="mark" viewBox="0 0 24 24" fill="none" role="img" aria-label="Sandcastle">
        <rect width="24" height="24" rx="5" fill="#3461c9" />
        <g transform="translate(12 12.2) scale(0.82) translate(-11 -11.6)" stroke="#ffffff" stroke-linejoin="round" stroke-linecap="round">
          <path d="M12 2.4v4.2" stroke-width="1.6" />
          <path d="M12 2.7 16 3.9 12 5.1Z" fill="#f4c77a" stroke="none" />
          <path d="M3.5 20.8v-8.3h2.2v-2h2.2v2h2v-2.9h2.2v2.9h2v-2h2.2v2h2.2v8.3Z" fill="#ffffff" fill-opacity="0.18" stroke-width="1.5" />
          <path d="M9.9 20.8v-3a2.1 2.1 0 0 1 4.2 0v3" stroke-width="1.4" fill="none" />
        </g>
      </svg>
      <div class="code">404 — Page not found</div>
      <h1>This sandcastle washed away</h1>
      <p>The page you were looking for isn't here. Head back and describe an app — an AI team will build it live.</p>
      <a class="btn" href="/">Back to Sandcastle</a>
    </main>
  </body>
</html>
