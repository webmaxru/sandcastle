<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" role="img" aria-label="A plain LLM returns text; the GitHub Copilot provider returns actions in a real sandbox.">
  <rect x="0" y="0" width="1200" height="560" rx="20" fill="#FBF8F2"/>

  <!-- Title -->
  <text x="600" y="52" text-anchor="middle" font-size="30" font-weight="700" fill="#1F2937">A plain LLM returns <tspan fill="#9CA3AF">text</tspan>. The Copilot provider returns <tspan fill="#0E7C86">actions</tspan>.</text>
  <text x="600" y="84" text-anchor="middle" font-size="17" fill="#6B7280">Microsoft Agent Framework · GitHub Copilot provider — an agent with a real, sandboxed computer.</text>

  <!-- ============ LEFT PANEL: Plain LLM ============ -->
  <g transform="translate(56,110)">
    <rect x="0" y="0" width="520" height="410" rx="16" fill="#FFFFFF" stroke="#E7E0D3" stroke-width="1.5"/>
    <rect x="0" y="0" width="520" height="6" rx="3" fill="#9CA3AF"/>

    <rect x="24" y="26" width="180" height="30" rx="15" fill="#F1F0EC"/>
    <text x="114" y="46" text-anchor="middle" font-size="13" font-weight="700" letter-spacing="1" fill="#6B7280">PLAIN LLM CALL</text>

    <!-- prompt -->
    <rect x="150" y="76" width="220" height="42" rx="10" fill="#F3F4F6" stroke="#E5E7EB"/>
    <text x="260" y="102" text-anchor="middle" font-size="14" fill="#374151">"build me a Pomodoro timer"</text>

    <!-- arrow -->
    <line x1="260" y1="120" x2="260" y2="150" stroke="#C7CBD1" stroke-width="2.5" marker-end="url(#greyArrow)"/>

    <!-- actor -->
    <rect x="196" y="152" width="128" height="42" rx="10" fill="#EAEAEA" stroke="#D1D5DB"/>
    <text x="260" y="178" text-anchor="middle" font-size="15" font-weight="700" fill="#4B5563">LLM</text>

    <line x1="260" y1="196" x2="260" y2="224" stroke="#C7CBD1" stroke-width="2.5" marker-end="url(#greyArrow)"/>

    <!-- output: inert code text -->
    <rect x="40" y="226" width="440" height="118" rx="12" fill="#F7F7F5" stroke="#E5E7EB"/>
    <text x="60" y="252" font-size="13.5" font-family="'Cascadia Code', Consolas, monospace" fill="#9AA1AB">// here's some code you can try:</text>
    <text x="60" y="276" font-size="13.5" font-family="'Cascadia Code', Consolas, monospace" fill="#8B93A0">function startTimer(mins) {</text>
    <text x="60" y="298" font-size="13.5" font-family="'Cascadia Code', Consolas, monospace" fill="#8B93A0">  // ...you wire it up, run it,</text>
    <text x="60" y="320" font-size="13.5" font-family="'Cascadia Code', Consolas, monospace" fill="#8B93A0">  // debug it, and host it.</text>

    <text x="260" y="380" text-anchor="middle" font-size="14.5" fill="#6B7280">Output is a <tspan font-weight="700" fill="#4B5563">suggestion</tspan>. A human still runs and debugs it.</text>
  </g>

  <!-- ============ RIGHT PANEL: Copilot provider ============ -->
  <g transform="translate(624,110)">
    <rect x="0" y="0" width="520" height="410" rx="16" fill="#FFFFFF" stroke="#B7E2DD" stroke-width="1.5"/>
    <rect x="0" y="0" width="520" height="6" rx="3" fill="#0E7C86"/>

    <rect x="24" y="26" width="270" height="30" rx="15" fill="#E1F3F1"/>
    <text x="159" y="46" text-anchor="middle" font-size="13" font-weight="700" letter-spacing="1" fill="#0E7C86">GITHUB COPILOT PROVIDER</text>

    <!-- prompt -->
    <rect x="150" y="76" width="220" height="42" rx="10" fill="#FEF1DA" stroke="#F6D68A"/>
    <text x="260" y="102" text-anchor="middle" font-size="14" fill="#92600A">"build me a Pomodoro timer"</text>

    <line x1="260" y1="120" x2="260" y2="150" stroke="#8FD3CB" stroke-width="2.5" marker-end="url(#tealArrow)"/>

    <!-- actor -->
    <rect x="188" y="152" width="144" height="42" rx="10" fill="#0E7C86"/>
    <text x="260" y="178" text-anchor="middle" font-size="15" font-weight="700" fill="#FFFFFF">AGENT</text>

    <line x1="260" y1="196" x2="260" y2="224" stroke="#8FD3CB" stroke-width="2.5" marker-end="url(#tealArrow)"/>

    <!-- output: a sandbox computer running actions -->
    <rect x="40" y="226" width="440" height="118" rx="12" fill="#F2FAF9" stroke="#CDEBE7"/>

    <!-- action rows -->
    <g font-size="13.5" font-family="'Cascadia Code', Consolas, monospace">
      <rect x="56" y="240" width="70" height="22" rx="6" fill="#1F2937"/>
      <text x="91" y="256" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">SHELL</text>
      <text x="136" y="256" fill="#374151">$ node build.js</text>

      <rect x="56" y="268" width="70" height="22" rx="6" fill="#B45309"/>
      <text x="91" y="284" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">FILES</text>
      <text x="136" y="284" fill="#374151">write index.html</text>

      <rect x="286" y="240" width="70" height="22" rx="6" fill="#0E7C86"/>
      <text x="321" y="256" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">FETCH</text>
      <text x="366" y="256" fill="#374151">assets</text>

      <rect x="286" y="268" width="70" height="22" rx="6" fill="#6D28D9"/>
      <text x="321" y="284" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">MCP</text>
      <text x="366" y="284" fill="#374151">Learn docs</text>
    </g>

    <!-- running pill -->
    <rect x="150" y="304" width="220" height="28" rx="14" fill="#DCFCE7" stroke="#86EFAC"/>
    <circle cx="172" cy="318" r="5" fill="#16A34A"/>
    <text x="260" y="323" text-anchor="middle" font-size="13" font-weight="700" fill="#15803D">app running in live preview</text>

    <text x="260" y="380" text-anchor="middle" font-size="14.5" fill="#0E7C86">Output is <tspan font-weight="700">working software</tspan> — built, run, and self-healed.</text>
  </g>

  <defs>
    <marker id="greyArrow" markerWidth="10" markerHeight="10" refX="6" refY="5" orient="auto">
      <path d="M0,0 L8,5 L0,10 z" fill="#C7CBD1"/>
    </marker>
    <marker id="tealArrow" markerWidth="10" markerHeight="10" refX="6" refY="5" orient="auto">
      <path d="M0,0 L8,5 L0,10 z" fill="#8FD3CB"/>
    </marker>
  </defs>
</svg>
